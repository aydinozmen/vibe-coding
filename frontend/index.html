<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding - Canlı Veri</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f7;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 { color: #1d1d1f; margin-bottom: 20px; }
        .status-box {
            background: #f2f2f7;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #0071e3;
            font-size: 16px;
            color: #1d1d1f;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Vibe Coding</h2>
        <div id="db-message" class="status-box">Yükleniyor...</div>
    </div>

    <script>
        // Sayfa açıldığında backend'e istek atıyoruz
        fetch('https://vibe-coding-production-b680.up.railway.app/api/data')
            .then(response => response.json())
            .then(data => {
                // Gelen JSON'daki message alanını HTML elementinin içine basıyoruz
                document.getElementById('db-message').innerText = data.mesaj;
            })
            .catch(error => {
                console.error('Hata:', error);
                document.getElementById('db-message').innerText = 'Backend bağlantı hatası!';
            });
    </script>

</body>
</html>
