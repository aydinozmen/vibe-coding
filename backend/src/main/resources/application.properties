# Port Ayarı
server.port=${PORT:8080}

# Veritabanı Bağlantı Ayarları (Lokalde Docker'a bağlanır, bulutta Railway değişkenlerini okur)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vibedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vibeuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vibepass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA Ayarları (Tabloları otomatik oluşturması için)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect